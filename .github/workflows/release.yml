name: Build and Release

on:
  push:
    tags:
      - 'v*'   # Triggers on tags like v1.0.0

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpcap-dev libcsv-dev libjansson-dev

      - name: Build binary
        run: make

      - name: Build Debian package
        uses: andy5995/gh-action-build-deb@v1
        with:
          args: |
            --no-sign

      - name: Calculate Debian package checksum
        run: |
          cd output/
          for DEB in *.deb; do
            DEB_FILENAME=$(basename "$DEB")
            sha256sum "$DEB_FILENAME" > "../$DEB_FILENAME.sha256sum"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nomadcap-deb
          path: |
            output/*.deb
            *deb.sha256sum
          if-no-files-found: error

  release:
    needs: build-deb
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: nomadcap-deb

      - name: Extract release notes from debian/changelog
        run: |
          awk '
            /^nomadcap \(/ { count++; next }
            count == 1 && /^ --/ { exit }
            count == 1     { print }
          ' debian/changelog > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          prerelease: false
          body_path: RELEASE_NOTES.md
          discussion_category_name: Announcements
          tag_name: ${{ github.ref_name }}
          files: |
            output/*.deb
            *deb.sha256sum
